[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs =
    .git
    .venv
    venv
    node_modules
    backend/uploads
    backend/tmp_files
    temp_pytest_accessible
    pytest_tmp_new
    pytest-cache-files-*
    tmp
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
