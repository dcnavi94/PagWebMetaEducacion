version: "3.8"

services:
  db:
    image: postgres:13-alpine
    container_name: unives-postgres
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: unives-backend
    env_file:
      - backend/.env
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: .
    container_name: unives-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  moodle-db:
    image: bitnamilegacy/mariadb:11.4
    container_name: unives-moodle-db
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - MARIADB_ROOT_PASSWORD=Unives_root123
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=Unives12345
    volumes:
      - moodle_mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "/opt/bitnami/scripts/mariadb/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  moodle:
    image: bitnamilegacy/moodle:latest
    container_name: unives-moodle
    ports:
      - "8081:8080"
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - MOODLE_DATABASE_TYPE=mariadb
      - MOODLE_DATABASE_HOST=moodle-db
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_PASSWORD=Unives12345
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=Admin12345!
      - MOODLE_EMAIL=admin@unives.local
      - MOODLE_SITE_NAME=UNIVES Moodle
      - MOODLE_SKIP_BOOTSTRAP=no
      - BITNAMI_DEBUG=true
      - UNIVES_SSO_SECRET=${UNIVES_SSO_SECRET:-02c9c861cf440efd8bef8854db78d0580bd93019d734246b48595ab3920220cc}
    volumes:
      - moodle_app_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
      - ./moodle/local/univessso:/bitnami/moodle/local/univessso:ro
    depends_on:
      moodle-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://localhost:8080/login/index.php\") === false ? 1 : 0);'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
  moodle_mariadb_data:
  moodle_app_data:
  moodledata_data:
