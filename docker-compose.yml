version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: unives-postgres
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: unives-backend
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: .
    container_name: unives-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
