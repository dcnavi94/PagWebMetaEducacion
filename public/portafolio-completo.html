<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Completo | MetaEducación</title>
    <link rel="icon" type="image/png" href="assets/logo_white.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .portfolio-header {
            background: linear-gradient(135deg, #1a3db6 0%, #102a83 100%);
            padding: 80px 0;
            color: white;
            text-align: center;
        }

        .career-filter-btn {
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid transparent;
            background: white;
            color: #1a3db6;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .career-filter-btn.active {
            background: #ff4d94;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 148, 0.3);
        }

        .career-filter-btn:hover {
            transform: translateY(-3px);
            background: #f8f9fa;
        }
    </style>
<link rel="preload" href="style.min.css" as="style">
    <link rel="preload" href="script.min.js" as="script">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-blue sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/logo_white.png" alt="Logo" height="40" class="me-2">
                <span class="fw-bolder italic">MetaEducación</span>
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-3">Volver al Inicio</a>
        </div>
    </nav>

    <header class="portfolio-header">
        <div class="container text-center">
            <h1 class="display-3 fw-bolder italic mb-3">Portafolio de la <span class="text-pink">Legión</span></h1>
            <p class="h5 opacity-75">Explora todos los proyectos, innovaciones y eventos de nuestra comunidad.</p>
        </div>
    </header>

    <div class="container py-5">
        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5" id="filters">
            <button class="career-filter-btn active" onclick="filterProjects('Todos')">Todos</button>
            <button class="career-filter-btn" onclick="filterProjects('Software')">Software</button>
            <button class="career-filter-btn" onclick="filterProjects('Robótica')">Robótica</button>
            <button class="career-filter-btn" onclick="filterProjects('Eventos')">Eventos</button>
            <button class="career-filter-btn" onclick="filterProjects('Preparatoria')">Preparatoria</button>
        </div>

        <div class="row g-4" id="fullPortfolioGrid">
            <!-- Cargando... -->
            <div class="text-center py-5">
                <div class="spinner-border text-pink" role="status"></div>
                <p class="mt-3 text-muted italic">Invocando el conocimiento de la Legión...</p>
            </div>
        </div>
    </div>

    <footer class="bg-blue text-white py-5 mt-5">
        <div class="container text-center">
            <img src="assets/logo_white.png" height="50" class="mb-4">
            <p>© 2025 MetaEducación. Transformando el futuro tech del Bajío.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qzymwhuhczhoisuhuwbl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_oEuepxOVbuZWb-vZOHGnmg_CXybs_vt';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProjects = [];

        async function loadAllProjects() {
            const { data, error } = await supabaseClient
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });

            if (data) {
                allProjects = data;
                renderGrid(data);
            }
        }

        function renderGrid(projects) {
            const grid = document.getElementById('fullPortfolioGrid');
            if (projects.length === 0) {
                grid.innerHTML = '<div class="text-center py-5"><p class="text-muted">No hay proyectos en esta categoría aún.</p></div>';
                return;
            }

            grid.innerHTML = '';
            projects.forEach(p => {
                const card = `
                    <div class="col-md-4 col-sm-6">
                        <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden career-card">
                            <div style="height: 220px; overflow: hidden;">
                                <img src="${p.image_url || 'assets/robot_creation.png'}" class="card-img-top h-100 w-100" style="object-fit: cover;">
                            </div>
                            <div class="card-body p-4">
                                <span class="badge ${getBadgeClass(p.category)} mb-2">${p.category}</span>
                                <h4 class="fw-bold text-blue h5">${p.title}</h4>
                                <p class="text-muted small">${p.short_description}</p>
                                <a href="proyecto-detalle.html?id=${p.id}" class="btn btn-outline-pink btn-sm rounded-pill px-3 mt-2">Más Información</a>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterProjects(category) {
            // Update active btn
            document.querySelectorAll('.career-filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === category) btn.classList.add('active');
            });

            if (category === 'Todos') {
                renderGrid(allProjects);
            } else {
                const filtered = allProjects.filter(p => p.category.includes(category));
                renderGrid(filtered);
            }
        }

        function getBadgeClass(cat) {
            const map = {
                'Robótica': 'bg-soft-blue text-blue',
                'Software': 'bg-soft-pink text-pink',
                'Eventos': 'bg-soft-purple text-purple',
                'Preparatoria': 'bg-warning text-dark'
            };
            return map[cat] || 'bg-light text-muted';
        }

        loadAllProjects();
    </script>
</body>

</html>
