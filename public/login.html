<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | MetaEducación</title>
    <link rel="icon" type="image/png" href="assets/logo_white.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Outfit', sans-serif;
            background: #0d1f6d;
            overflow: hidden;
        }

        /* ── Animated background ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a1550 0%, #1a3db6 45%, #0f2580 75%, #0a1550 100%);
            z-index: 0;
        }
        .bg-canvas::before,
        .bg-canvas::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: blobFloat 18s ease-in-out infinite alternate;
        }
        .bg-canvas::before {
            width: 500px; height: 500px;
            top: -120px; left: -120px;
            background: rgba(255, 87, 34, 0.12);
        }
        .bg-canvas::after {
            width: 600px; height: 600px;
            bottom: -150px; right: -150px;
            background: rgba(26, 61, 182, 0.3);
            animation-delay: -9s;
        }
        @keyframes blobFloat {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        /* ── Card shell ── */
        .login-shell {
            position: relative;
            z-index: 1;
            display: flex;
            width: min(900px, 96vw);
            min-height: 520px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.08) inset;
            animation: cardIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        /* ── Left decorative panel ── */
        .login-deco {
            flex: 1;
            background: linear-gradient(160deg, #1a3db6 0%, #14309c 40%, #0d1f6d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 36px;
            position: relative;
            overflow: hidden;
        }
        .login-deco::before {
            content: '';
            position: absolute;
            width: 350px; height: 350px;
            border-radius: 50%;
            border: 60px solid rgba(255,255,255,0.04);
            top: -80px; left: -80px;
        }
        .login-deco::after {
            content: '';
            position: absolute;
            width: 250px; height: 250px;
            border-radius: 50%;
            border: 40px solid rgba(255,87,34,0.08);
            bottom: -60px; right: -60px;
        }
        .deco-logo {
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 28px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 12px;
        }
        .deco-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }
        .deco-title {
            color: #fff;
            font-size: 2rem;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-align: center;
        }
        .deco-subtitle {
            color: rgba(255,255,255,0.55);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 40px;
        }
        .deco-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: rgba(255,87,34,0.15);
            border: 1px solid rgba(255,87,34,0.3);
            border-radius: 50px;
            color: #ff8a65;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ── Right form panel ── */
        .login-form-panel {
            width: 380px;
            flex-shrink: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 40px;
        }
        .form-heading {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0d1f6d;
            margin-bottom: 4px;
        }
        .form-subheading {
            color: #94a3b8;
            font-size: 0.88rem;
            margin-bottom: 32px;
        }

        /* ── Floating label fields ── */
        .field-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .field-wrap label {
            position: absolute;
            top: 50%;
            left: 44px;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 500;
            pointer-events: none;
            transition: all 0.2s ease;
            background: transparent;
        }
        .field-wrap input:focus ~ label,
        .field-wrap input:not(:placeholder-shown) ~ label {
            top: -9px;
            left: 12px;
            font-size: 0.72rem;
            color: #1a3db6;
            background: #fff;
            padding: 0 6px;
            font-weight: 600;
        }
        .field-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #cbd5e1;
            font-size: 1rem;
            transition: color 0.2s;
            pointer-events: none;
        }
        .field-wrap input:focus ~ .field-icon,
        .field-wrap:focus-within .field-icon { color: #1a3db6; }
        .field-wrap input {
            width: 100%;
            padding: 15px 44px 15px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: all 0.25s ease;
        }
        .field-wrap input:focus {
            border-color: #1a3db6;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(26, 61, 182, 0.1);
        }
        .field-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .field-wrap .toggle-pw:hover { color: #1a3db6; }

        /* ── Error box ── */
        #errorMessage {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(220, 38, 38, 0.07);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 12px;
            color: #dc2626;
            font-size: 0.85rem;
            margin-bottom: 20px;
            animation: shake 0.45s ease;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
        }

        /* ── Submit button ── */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff5722 0%, #e64a19 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 18px rgba(255, 87, 34, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(255, 87, 34, 0.45);
        }
        .btn-login:active:not(:disabled) { transform: translateY(-1px); }
        .btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 20px;
            color: #cbd5e1;
            font-size: 0.78rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        /* ── Back link ── */
        .back-link {
            text-align: center;
        }
        .back-link a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .back-link a:hover { color: #1a3db6; }

        /* ── Mobile header (solo visible en móvil) ── */
        .mobile-header {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 28px 28px 0;
            gap: 10px;
        }
        .mobile-logo-wrap {
            width: 64px; height: 64px;
            background: #14309c;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            padding: 8px;
        }
        .mobile-logo-wrap img {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }
        .mobile-brand {
            font-size: 1.4rem;
            font-weight: 800;
            font-style: italic;
            color: #0d1f6d;
            letter-spacing: -0.3px;
        }
        .mobile-tagline {
            font-size: 0.78rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        /* ── Campus Virtual link ── */
        .campus-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            color: #1a3db6;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            margin-bottom: 4px;
        }
        .campus-link:hover {
            border-color: #1a3db6;
            background: rgba(26, 61, 182, 0.05);
            color: #0d1f6d;
        }

        /* ── Responsive ── */
        @media (max-width: 680px) {
            .login-deco { display: none; }
            .mobile-header { display: flex; }
            .login-shell { width: min(420px, 96vw); flex-direction: column; min-height: unset; }
            .login-form-panel { width: 100%; padding: 20px 28px 36px; }
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>

    <div class="login-shell">

        <!-- Decorative left panel -->
        <div class="login-deco">
            <div class="deco-logo">
                <img src="assets/logo_white.png" alt="Logo MetaEducación">
            </div>
            <div class="deco-title">MetaEducación</div>
            <div class="deco-subtitle">Plataforma Escolar<br>Legión Axolot</div>
            <div class="deco-badge">
                <i class="bi bi-shield-check-fill"></i>
                Acceso seguro 256-bit
            </div>
        </div>

        <!-- Form panel -->
        <div class="login-form-panel">

            <!-- Cabecera solo visible en móvil -->
            <div class="mobile-header">
                <div class="mobile-logo-wrap">
                    <img src="assets/logo_white.png" alt="Logo MetaEducación">
                </div>
                <div class="mobile-brand">MetaEducación</div>
                <div class="mobile-tagline">Plataforma Escolar — Legión Axolot</div>
            </div>

            <div class="form-heading">Bienvenido</div>
            <div class="form-subheading">Ingresa tus credenciales para continuar</div>

            <div id="errorMessage">
                <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" novalidate>
                <!-- Username -->
                <div class="field-wrap">
                    <input type="text" id="username" placeholder=" " required autocomplete="username">
                    <i class="bi bi-person field-icon"></i>
                    <label for="username">Matrícula / Usuario</label>
                </div>

                <!-- Password -->
                <div class="field-wrap">
                    <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                    <i class="bi bi-lock field-icon"></i>
                    <label for="password">Contraseña</label>
                    <button type="button" class="toggle-pw" id="togglePw" tabindex="-1" aria-label="Mostrar contraseña">
                        <i class="bi bi-eye" id="togglePwIcon"></i>
                    </button>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text"><i class="bi bi-box-arrow-in-right"></i> Entrar a la Legión</span>
                    <span class="btn-loading d-none">
                        <span class="spinner-border spinner-border-sm" role="status"></span> Conectando…
                    </span>
                </button>
            </form>

            <div class="divider"><span>o</span></div>

            <div class="back-link">
                <a href="index.html"><i class="bi bi-arrow-left"></i> Volver al sitio principal</a>
            </div>
        </div>

    </div>

    <script src="assets/api.js"></script>
    <script>
        const loginForm   = document.getElementById('loginForm');
        const errorBox    = document.getElementById('errorMessage');
        const errorText   = document.getElementById('errorText');
        const btnLogin    = document.getElementById('btnLogin');
        const btnText     = btnLogin.querySelector('.btn-text');
        const btnLoading  = btnLogin.querySelector('.btn-loading');
        const togglePw    = document.getElementById('togglePw');
        const toggleIcon  = document.getElementById('togglePwIcon');
        const pwInput     = document.getElementById('password');

        // Show/hide password
        togglePw.addEventListener('click', () => {
            const isText = pwInput.type === 'text';
            pwInput.type = isText ? 'password' : 'text';
            toggleIcon.className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
        });

        // Session-expired message
        (function () {
            const reason = new URLSearchParams(window.location.search).get('reason');
            if (reason === 'expired') showError('Tu sesión expiró. Vuelve a iniciar sesión.');
        })();

        function showError(msg) {
            errorText.textContent = msg;
            errorBox.style.display = 'flex';
            errorBox.style.animation = 'none';
            requestAnimationFrame(() => { errorBox.style.animation = ''; });
        }

        function setLoading(on) {
            btnLogin.disabled = on;
            btnText.classList.toggle('d-none', on);
            btnLoading.classList.toggle('d-none', !on);
        }

        async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const rawFetch = window.rawFetch || window.fetch.bind(window);
                return await rawFetch(url, { ...options, signal: controller.signal });
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function fetchProfileWithFallback(accessToken, apiBase) {
            const profileHeaders = { 'Authorization': `Bearer ${accessToken}` };
            const candidates = [
                `${apiBase}/users/me`,
                'http://localhost:8000/users/me'
            ];
            let lastError = null;

            for (const url of candidates) {
                try {
                    const response = await fetchWithTimeout(url, { headers: profileHeaders }, 15000);
                    if (response.ok) return response;
                    lastError = new Error(`HTTP ${response.status} en ${url}`);
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error('No se pudo verificar el perfil');
        }

        async function postLoginWithFallback(body, apiBase) {
            const candidates = [
                `${apiBase}/token`,
                'http://localhost:8000/token'
            ];
            let lastError = null;

            for (const url of candidates) {
                try {
                    const response = await fetchWithTimeout(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body
                    }, 15000);
                    return response;
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error('No se pudo iniciar sesión');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            setLoading(true);

            const username = document.getElementById('username').value.trim();
            const password = pwInput.value;

            const body = new URLSearchParams();
            body.append('username', username);
            body.append('password', password);
            const apiBase = window.API_BASE || `${window.location.origin}/api`;

            try {
                const res = await postLoginWithFallback(body, apiBase);

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token || '');
                    localStorage.setItem('token_type', data.token_type);

                    try {
                        const meRes = await fetchProfileWithFallback(data.access_token, apiBase);
                        if (meRes.ok) {
                            const me = await meRes.json();
                            if      (me.role === 'admin')    window.location.href = 'admin.html';
                            else if (me.role === 'teacher')  window.location.href = 'teacher.html';
                            else if (me.role === 'services') window.location.href = 'admin.html';
                            else                             window.location.href = 'campus-virtual.html';
                            return;
                        }
                        showError('No se pudo obtener el perfil. Intenta de nuevo.');
                    } catch (_) {
                        showError('Error de conexión al verificar el perfil.');
                    }
                } else {
                    const err = await res.json();
                    const msg = typeof err.detail === 'string'
                        ? err.detail
                        : (err.detail?.[0]?.msg || 'Usuario o contraseña incorrectos');
                    showError(msg);
                }
            } catch (_) {
                showError('Error de conexión. Verifica que el servidor esté en ejecución.');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
