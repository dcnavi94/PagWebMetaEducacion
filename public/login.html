<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | MetaEducación</title>
    <link rel="icon" type="image/png" href="assets/logo_white.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3db6 0%, #14309c 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-container img {
            height: 60px;
            margin-bottom: 10px;
        }
        .logo-container h2 {
            color: #1a3db6;
            font-weight: 800;
            font-style: italic;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #eee;
            margin-bottom: 20px;
        }
        .form-control:focus {
            border-color: #d81b60;
            box-shadow: none;
        }
        .btn-login {
            background: #d81b60;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background: #ad1457;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4);
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            color: #1a3db6;
        }
        #errorMessage {
            color: #d81b60;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="assets/logo_white.png" alt="Logo" style="filter: brightness(0) saturate(100%) invert(21%) sepia(82%) disabilities(2123%) hue-rotate(221deg) brightness(85%) contrast(98%);">
            <h2>MetaEducación</h2>
            <p class="text-muted">Plataforma Escolar</p>
        </div>

        <div id="errorMessage"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Matrícula / Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" class="form-control bg-light border-0" placeholder="Ej. ALU12345" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" class="form-control bg-light border-0" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login">Entrar a la Legión</button>
        </form>

        <div class="back-link">
            <a href="index.html"><i class="bi bi-arrow-left me-1"></i> Volver al sitio principal</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const response = await fetch('http://localhost:8000/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('token_type', data.token_type);
                    
                    // Redirigir al portal
                    window.location.href = 'campus-virtual.html';
                } else {
                    const errorData = await response.json();
                    errorMessage.textContent = errorData.detail || 'Usuario o contraseña incorrectos';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Error de conexión con el servidor';
                errorMessage.style.display = 'block';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
